{{define "title"}}gh-ops - {{.Action}}{{end}}
{{define "content"}}
<div class="w-full max-w-lg">
    <div class="rounded-xl border border-zinc-200 bg-white p-8 shadow-sm">
        <div class="mb-6 flex items-center justify-center">
            <div class="flex h-12 w-12 items-center justify-center rounded-full bg-green-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-green-600"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
        </div>

        <div class="text-center">
            <h1 class="text-xl font-semibold tracking-tight">Action Completed</h1>
            <div class="mt-2 inline-flex items-center rounded-full bg-zinc-100 px-3 py-1">
                <span class="text-xs font-medium text-zinc-600">{{.Action}}</span>
            </div>
        </div>

        <div class="mt-6 rounded-lg border border-green-100 bg-green-50 px-4 py-3">
            <p class="text-sm text-green-800">{{.Message}}</p>
        </div>

        <div class="mt-6 flex gap-3">
            <a href="/" class="flex flex-1 items-center justify-center rounded-lg border border-zinc-200 bg-white px-4 py-2.5 text-sm font-medium text-zinc-700 transition-colors hover:bg-zinc-50">
                Back to Home
            </a>
        </div>
    </div>
</div>
{{end}}

{{template "base" .}}
