{{define "title"}}Error - gh-ops{{end}}
{{define "content"}}
<div class="w-full max-w-lg">
    <div class="rounded-xl border border-border bg-white p-8 shadow-sm">
        <div class="mb-6 flex items-center justify-center">
            <div class="flex h-12 w-12 items-center justify-center rounded-full bg-red-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-red-600"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
            </div>
        </div>

        <div class="text-center">
            <h1 class="text-xl font-semibold text-red-600">Error</h1>
        </div>

        <div class="mt-6 rounded-lg border border-red-100 bg-red-50 px-4 py-3">
            <p class="text-sm text-red-800">{{.Message}}</p>
        </div>

        <div class="mt-6 flex gap-3">
            <a href="/" class="flex flex-1 items-center justify-center rounded-lg border border-border bg-white px-4 py-2.5 text-sm font-medium text-ink-700 transition-colors hover:bg-cream-100">
                Back to Home
            </a>
        </div>
    </div>
</div>
{{end}}

{{template "base" .}}
