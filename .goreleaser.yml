project_name: gh-ops
version: 2

before:
  hooks:
    - go mod download

builds:
  - id: gh-ops
    main: .
    binary: gh-ops
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: gh-ops-archive
    ids:
      - gh-ops
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - config.yaml.example
      - README.md

brews:
  - name: gh-ops
    ids:
      - gh-ops-archive
    repository:
      owner: SammyLin
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      directory: Formula
    description: "One-click GitHub operations via OAuth for AI agents"
    homepage: "https://github.com/SammyLin/gh-ops"
    license: "MIT"
    install: |
      bin.install "gh-ops"
    test: |
      assert_match "One-click GitHub operations", shell_output("#{bin}/gh-ops --help")

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: SammyLin
    name: gh-ops
  draft: false
