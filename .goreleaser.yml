project_name: gh-ops
version: 2

before:
  hooks:
    - go mod download

builds:
  - id: gh-ops
    main: .
    binary: gh-ops
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - config.yaml
      - README.md

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: SammyLin
    name: gh-ops
  draft: false

dockers_v2:
  - images:
      - "ghcr.io/sammylin/gh-ops:{{ .Tag }}"
      - "ghcr.io/sammylin/gh-ops:latest"
    goos: linux
    goarch:
      - amd64
      - arm64
